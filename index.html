<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="smallicon.png">
<link rel="apple-touch-icon" href="smallicon.png">
<meta name="apple-mobile-web-app-title" content="Calendar">

    <!-- Firebase SDK Scripts (v10 Compatibility Mode for Cloud Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --meadow-green: #872020;
            --meadow-green-dark: #000000;
            --sky-blue: #6f97b8;
            --straw: #cdb46a;
            --ink: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #cfe0d8; /* shown briefly while the photo loads */
            background-image:
                linear-gradient(180deg, rgba(20, 35, 20, 0.25), rgba(20, 35, 20, 0.15)),
                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }

        /* iOS Safari doesn't handle fixed backgrounds well - fall back to scroll */
        @supports (-webkit-touch-callout: none) {
            body {
                background-attachment: scroll;
            }
        }

        .calendar-container {
            background-color: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(20, 35, 20, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 340px;
            max-width: 100%;
            box-sizing: border-box;
            animation: containerIn 0.4s ease;
        }

        @media (max-width: 400px) {
            .calendar-container {
                width: 100%;
                padding: 20px 16px;
                border-radius: 12px;
            }
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* New Top Row Container */
        .top-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        /* Updated Toggle Button Styles */
        .toggle-input-btn {
            background: none;
            border: 1px solid transparent;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #999;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
            line-height: 1; /* Helps align the emoji perfectly */
        }

        .toggle-input-btn:hover {
            color: var(--meadow-green-dark);
            background: rgba(111, 151, 184, 0.12);
            border-color: rgba(111, 151, 184, 0.25);
        }

        .toggle-input-btn:active {
            transform: scale(0.92);
        }

        .hidden {
            display: none;
        }

        #eventInput {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #eventInput:focus {
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(51, 51, 51, 0.06);
        }

        /* Enter button (submit / sync) */
        .enter-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            background-color: var(--meadow-green);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .enter-btn:hover {
            background-color: var(--meadow-green-dark);
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        .enter-btn.hidden {
            display: none;
        }

        #passwordInput {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #passwordInput:focus {
            border-color: #333;
            box-shadow: 0 0 0 3px rgba(51, 51, 51, 0.06);
        }

        .password-error {
            font-size: 0.75rem;
            color: var(--meadow-green);
            text-align: center;
            margin-top: -6px;
            margin-bottom: 10px;
        }

        .password-error.hidden {
            display: none;
        }

        .status {
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            margin-bottom: 15px;
            min-height: 1em;
        }

        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .month-year {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--meadow-green-dark);
            user-select: none;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 1.1rem;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
        }

        .nav-btn:hover {
            color: var(--meadow-green-dark);
            background: rgba(111, 151, 184, 0.12);
            border-color: rgba(111, 151, 184, 0.25);
        }

        .nav-btn:active {
            transform: scale(0.92);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }

        .weekdays div {
            font-size: 0.75rem;
            font-weight: bold;
            color: #888;
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 5px;
        }

        .day {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 45px;
            width: 40px;
            margin: 0 auto;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #333;
            transition: background 0.15s ease;
            cursor: default;
            position: relative;
        }

        .day:not(.other-month):not(.today):hover {
            background-color: #f5f5f5;
        }

        .today {
            background-color: var(--meadow-green);
            color: #ffffff;
            font-weight: bold;
        }

        .today:hover {
            background-color: var(--meadow-green-dark);
        }

        .other-month {
            color: #ddd;
        }

        .day-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #333;
            margin-top: 1px;
            line-height: 1;
            animation: labelIn 0.2s ease;
        }

        .today .day-label {
            color: #ffffff;
        }

        @keyframes labelIn {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eeeeee;
            flex-wrap: wrap;
        }

        .legend-item {
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
        }

        @media (max-width: 400px) {
            .day {
                height: 38px;
                width: auto;
            }

            .day-label {
                font-size: 0.65rem;
            }

            .legend {
                gap: 8px;
            }

            .legend-item {
                font-size: 0.72rem;
            }

            .month-year {
                font-size: 1.2rem;
            }
        }

        @media (max-height: 600px) {
            body {
                align-items: flex-start;
            }

            .calendar-container {
                margin-top: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .calendar-container { animation: none; }
            .day-label { animation: none; }
            .nav-btn { transition: none; }
            .toggle-input-btn { transition: none; }
            .day { transition: none; }
            #eventInput { transition: none; }
        }
    </style>
</head>
<body>

    <div class="calendar-container">

        <!-- Dedicated Top Row for the Button -->
        <div class="top-controls">
            <button id="toggleInputBtn" class="toggle-input-btn" aria-label="Toggle event input">✏️</button>
        </div>

        <!-- Password prompt, shown first when unlocking editing -->
        <input type="password" id="passwordInput" class="hidden" placeholder="Enter password to edit" aria-label="Password" />
        <button id="passwordSubmitBtn" class="enter-btn hidden" onclick="handlePasswordSubmit()">Unlock</button>
        <div class="password-error hidden" id="passwordError">Incorrect password.</div>

        <!-- Textarea hidden by default -->
        <textarea id="eventInput" class="hidden" placeholder="Valid inputs only:&#10;2025&#10;11 July Sat Holiday&#10;12 July Sun MO3&#10;14 July Tues half day&#10;25 Jul-2 Aug holiday&#10;2026&#10;11 July Sat Holiday&#10;(A line with just a year, e.g. 2025, applies to all lines below it until the next year line. Other text like 'post call' is ignored)" aria-label="Event input"></textarea>

        <!-- Enter button, hidden alongside the textarea -->
        <button id="enterBtn" class="enter-btn hidden" onclick="handleEnter()">Enter</button>

        <!-- Sync status message -->
        <div class="status" id="statusMessage"></div>

        <div class="month-header">
            <button class="nav-btn" id="prevBtn" aria-label="Previous month">&#8249;</button>
            <div class="month-year" id="monthYear"></div>
            <button class="nav-btn" id="nextBtn" aria-label="Next month">&#8250;</button>
        </div>

        <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div class="days" id="calendarDays"></div>

        <div class="legend">
            <div class="legend-item">➡️➡️ Overnight</div>
            <div class="legend-item">🌓 Half day</div>
            <div class="legend-item">✅ Holiday</div>
        </div>

    </div>

    <script>
        const today = new Date();
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();
        const currentDate = today.getDate();

        let viewMonth = currentMonth;
        let viewYear = currentYear;

        const dayLabels = {};

        const monthMap = {
            jan: 0, january: 0, feb: 1, february: 1, mar: 2, march: 2,
            apr: 3, april: 3, may: 4, jun: 5, june: 5, jul: 6, july: 6,
            aug: 7, august: 7, sep: 8, september: 8, oct: 9, october: 9,
            nov: 10, november: 10, dec: 11, december: 11
        };

        const daysOfWeek = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        const statusDiv = document.getElementById("statusMessage");
        const eventInput = document.getElementById('eventInput');
        const enterBtn = document.getElementById('enterBtn');
        let useFirebase = false;
        let docRef = null;

        function updateStatus(msg) {
            statusDiv.textContent = msg;
        }

        // ---- FIREBASE INIT ----
        try {
            if (typeof firebase !== 'undefined') {
                const firebaseConfig = {
                    apiKey: "AIzaSyD9KvqrS7EKeIFfOg7FO_dJrnpxCcuzv24",
                    authDomain: "test-4715a.firebaseapp.com",
                    projectId: "test-4715a",
                    storageBucket: "test-4715a.firebasestorage.app",
                    messagingSenderId: "987560300871",
                    appId: "1:987560300871:web:f946127333d3eae80f3c62"
                };

                firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();

                // Force long-polling to break out of local network restrictions
                db.settings({ experimentalForceLongPolling: true });

                // Separate document from the paragraph-sync demo so the two don't collide
                docRef = db.collection("calendarEvents").doc("savedText");
                useFirebase = true;
            } else {
                updateStatus("Firebase scripts could not download. Running locally only.");
            }
        } catch (e) {
            updateStatus("Initialization fallback active. Running locally.");
        }

        // ---- TOGGLE INPUT + BUTTON TOGETHER (password gated) ----
        const EDIT_PASSWORD = "eeyore";
        let isUnlocked = false;

        const toggleBtn = document.getElementById('toggleInputBtn');
        const passwordInput = document.getElementById('passwordInput');
        const passwordSubmitBtn = document.getElementById('passwordSubmitBtn');
        const passwordError = document.getElementById('passwordError');

        toggleBtn.addEventListener('click', () => {
            if (isUnlocked) {
                // Already unlocked this session — just toggle the editor as before
                eventInput.classList.toggle('hidden');
                enterBtn.classList.toggle('hidden');
                if (!eventInput.classList.contains('hidden')) {
                    eventInput.focus();
                }
                return;
            }

            // Not unlocked yet — toggle the password prompt instead
            const showingPassword = !passwordInput.classList.contains('hidden');
            if (showingPassword) {
                // Closing the prompt
                passwordInput.classList.add('hidden');
                passwordSubmitBtn.classList.add('hidden');
                passwordError.classList.add('hidden');
                passwordInput.value = '';
            } else {
                passwordInput.classList.remove('hidden');
                passwordSubmitBtn.classList.remove('hidden');
                passwordInput.focus();
            }
        });

        function handlePasswordSubmit() {
            if (passwordInput.value === EDIT_PASSWORD) {
                isUnlocked = true;
                passwordInput.classList.add('hidden');
                passwordSubmitBtn.classList.add('hidden');
                passwordError.classList.add('hidden');
                passwordInput.value = '';

                eventInput.classList.remove('hidden');
                enterBtn.classList.remove('hidden');
                eventInput.focus();
            } else {
                passwordError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        // Allow pressing Enter inside the password field to submit
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handlePasswordSubmit();
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));

        function changeMonth(delta) {
            viewMonth += delta;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderCalendar();
        }

        function processLabels() {
            const text = eventInput.value;
            const lines = text.split('\n');

            for (let key in dayLabels) {
                delete dayLabels[key];
            }

            // A line that's just a 4-digit year switches the "active year"
            // for every line that follows, until the next year line.
            let activeYear = currentYear;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                const yearMatch = line.match(/^(\d{4})$/);
                if (yearMatch) {
                    activeYear = parseInt(yearMatch[1], 10);
                    continue;
                }

// Cross day/month range, e.g. "25 Jul asdfsd-2 Aug sdfsd holiday"
const crossRangeMatch = line.match(/^(\d{1,2})\s+([A-Za-z]+)(?:\s+\S+)?\s*-\s*(\d{1,2})\s+([A-Za-z]+)\s*(.*)$/i);

if (crossRangeMatch) {

    const startDay = parseInt(crossRangeMatch[1], 10);
    const startMonth = monthMap[crossRangeMatch[2].toLowerCase()];
    const endDay = parseInt(crossRangeMatch[3], 10);
    const endMonth = monthMap[crossRangeMatch[4].toLowerCase()];
    const label = crossRangeMatch[5].toLowerCase();

    if (startMonth !== undefined && endMonth !== undefined && (label.includes("holiday") || label.includes("half day"))) {

        const cursor = new Date(activeYear, startMonth, startDay);
        const end = new Date(activeYear, endMonth, endDay);

        while (cursor <= end) {

            const key = `${cursor.getDate()}-${cursor.getMonth()}-${cursor.getFullYear()}`;

            if (label.includes("holiday")) {
                dayLabels[key] = "✅";
            }

            if (label.includes("half day")) {
                dayLabels[key] = "🌓";
            }

            cursor.setDate(cursor.getDate() + 1);
        }

        continue;
    }
}

// Same-month day range, e.g. "11-15 Jul holiday"
const rangeMatch = line.match(/^(\d{1,2})-(\d{1,2})\s+([A-Za-z]+)(.*)$/i);

if (rangeMatch) {

    const startDay = parseInt(rangeMatch[1], 10);
    const endDay = parseInt(rangeMatch[2], 10);
    const monthIndex = monthMap[rangeMatch[3].toLowerCase()];
    const label = rangeMatch[4].toLowerCase();

    for (let d = startDay; d <= endDay; d++) {

        const key = `${d}-${monthIndex}-${activeYear}`;

        if (label.includes("holiday")) {
            dayLabels[key] = "✅";
        }

        if (label.includes("half day")) {
            dayLabels[key] = "🌓";
        }

    }

    continue;
}

                const parts = line.split(' ');
                if (parts.length < 3) continue;

                const day = parseInt(parts[0], 10);
                const monthStr = parts[1].toLowerCase();

                let labelParts = parts.slice(2);

                if (labelParts.length > 1 && daysOfWeek.includes(labelParts[0].toLowerCase())) {
                    labelParts = labelParts.slice(1);
                }

                const label = labelParts.join(' ');

                if (!isNaN(day) && (monthStr in monthMap)) {
                    const monthIndex = monthMap[monthStr];
                    const key = `${day}-${monthIndex}-${activeYear}`;

const moMatch = label.match(/\bMO(\d+)\b/i);

                    if (moMatch) {
                        dayLabels[key] = `${moMatch[1]}➡️`;
                        const nextDay = day + 1;
                        const nextKey = `${nextDay}-${monthIndex}-${activeYear}`;
                        dayLabels[nextKey] = "➡️";
} else if (label.toLowerCase().includes("half day")) {
    dayLabels[key] = "🌓";
} else if (label.toLowerCase().includes("holiday")) {
    dayLabels[key] = "✅";
}

                }
            }

            renderCalendar();
        }

        // ---- LOAD ON PAGE OPEN (local cache instantly, then Firestore) ----
        window.addEventListener('DOMContentLoaded', () => {
            const localData = localStorage.getItem('calendarEventText');
            if (localData) {
                eventInput.value = localData;
                processLabels();
            }

            if (useFirebase) {
                updateStatus("Connecting to cloud storage...");
                docRef.get().then((doc) => {
                    if (doc.exists) {
                        const firestoreData = doc.data().content;
                        if (firestoreData) {
                            localStorage.setItem('calendarEventText', firestoreData);
                            eventInput.value = firestoreData;
                            processLabels();
                            updateStatus("Synced successfully with Firestore!");
                        }
                    } else {
                        updateStatus("Connected! Ready to save your first entry.");
                    }
                }).catch((error) => {
                    updateStatus("Operating offline. Local cache active.");
                });
            } else {
                updateStatus("Offline-only local storage mode active.");
            }
        });

        // ---- ENTER BUTTON CLICKED ----
        function handleEnter() {
            const rawText = eventInput.value;

            // Save + re-render immediately from local input
            localStorage.setItem('calendarEventText', rawText);
            processLabels();
            updateStatus("Saved to local storage.");

            // Try syncing to Firestore
            if (useFirebase) {
                updateStatus("Attempting cloud sync...");
                docRef.set({ content: rawText })
                    .then(() => {
                        updateStatus("Saved locally and uploaded to Firestore!");
                    })
                    .catch((error) => {
                        updateStatus("Saved locally. Cloud upload rejected: " + error.message);
                    });
            }
        }

        window.handleEnter = handleEnter;

        renderCalendar();

        function renderCalendar() {
            const monthNames = ['January','February','March','April','May','June',
                                'July','August','September','October','November','December'];
            document.getElementById('monthYear').innerText = `${monthNames[viewMonth]} ${viewYear}`;

            const daysContainer = document.getElementById('calendarDays');
            daysContainer.innerHTML = '';

            const firstDayOfMonth = new Date(viewYear, viewMonth, 1).getDay();
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

            // Previous month trailing days
            for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day other-month';
                dayDiv.innerText = daysInPrevMonth - i;
                daysContainer.appendChild(dayDiv);
            }

            // Current month days
            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';

                const isToday = (i === currentDate && currentMonth === viewMonth && currentYear === viewYear);
                if (isToday) dayDiv.classList.add('today');

                const dateNum = document.createElement('span');
                dateNum.innerText = i;
                dayDiv.appendChild(dateNum);

                const key = `${i}-${viewMonth}-${viewYear}`;
                if (dayLabels[key]) {
                    const labelSpan = document.createElement('span');
                    labelSpan.className = 'day-label';
                    labelSpan.innerText = dayLabels[key];
                    dayDiv.appendChild(labelSpan);
                }

                daysContainer.appendChild(dayDiv);
            }

            // Next month leading days
            const totalDaysShown = firstDayOfMonth + daysInMonth;
            const remainingCells = (totalDaysShown % 7 === 0) ? 0 : (7 - (totalDaysShown % 7));

            for (let i = 1; i <= remainingCells; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day other-month';
                dayDiv.innerText = i;
                daysContainer.appendChild(dayDiv);
            }
        }
    </script>

</body>
</html>
